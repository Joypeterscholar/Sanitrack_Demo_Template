<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SaniTrack Interactive Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Poppins,sans-serif;
background:#F5F7FC;
overflow:hidden;
overflow-y:auto;


}

/* Top Navigation */

.topbar{

height:75px;

background:white;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 30px;

box-shadow:0 4px 15px rgba(0,0,0,.06);

}

@media(max-width:768px){

.topbar{

padding:10px;

flex-wrap:wrap;

height:auto;

}

}

.demo{

flex:1;

}

@media(max-width:768px){

.demo{

width:100%;

height:calc(100vh - 170px);

}

}



#menuBtn{

display:none;

background:none;

border:none;

font-size:28px;

cursor:pointer;

color:#241533;

margin-right:10px;

}

@media(max-width:768px){

#menuBtn{

display:block;

}

}

.left{

display:flex;

align-items:center;

gap:15px;

}

.logo{

height:45px;

}

.title{

font-size:22px;

font-weight:700;

color:#241533;

}

/* Right */

.right{

display:flex;

gap:15px;

align-items:center;

}

.badge{

padding:10px 16px;

border-radius:30px;

background:#E8EEFF;

color:#2F66F5;

font-weight:600;

}

@media(max-width:768px){

.badge{

display:none;

}

}

.timer{

background:#F8F8F8;

padding:10px 16px;

border-radius:30px;

font-weight:600;

}

.exit{

background:#E65CB3;

color:white;

border:none;

padding:12px 20px;

border-radius:14px;

font-weight:600;

}

/* Main */
.wrapper{

display:flex;
height:calc(100vh - 75px);

}

@media(max-width:768px){

.wrapper{

flex-direction:column;
height:auto;

}

}

/* Sidebar */

.sidebar{

width:320px;

background:#241533;

color:white;

padding:30px;

overflow:auto;
transition:.3s;


}

@media(max-width:768px){

.sidebar{

position:fixed;

left:-100%;

top:75px;

width:280px;

height:100%;

z-index:999;

}

.sidebar.open{

left:0;

}

}

.sidebar h3{

margin-bottom:25px;

}

.progress{

margin-top:25px;

}

.progress-item{

margin-bottom:18px;

}

.dot{

display:inline-block;

width:12px;

height:12px;

border-radius:50%;

background:#E65CB3;

margin-right:10px;

}

.current{

color:#7EE787;

font-weight:600;

}

.guide{

margin-top:40px;

background:rgba(255,255,255,.08);

padding:20px;

border-radius:18px;

}

.audioBtn{

position:fixed;

bottom:90px;

right:20px;

width:60px;

height:60px;

border-radius:50%;

background:#2F66F5;

color:white;

}

iframe{

width:100%;
height:100%;
border:none;

}

.guide h5{

margin-bottom:10px;

}

.voice{

margin-top:15px;

width:100%;

height:48px;

border:none;

border-radius:12px;

background:#2F66F5;

color:white;

font-weight:600;

}

@media (max-width:768px){

.topbar{
    display:none;
}

.sidebar{
    display:none;
}

.footer{
    display:none;
}

.wrapper{

height:100vh;

}

.demo{

width:100vw;
height:100vh;

}

iframe{

width:100%;
height:100%;

}

}

button,
.badge,
.progress-item {
    min-height: 44px;
}

button {
    touch-action: manipulation;
}

/* Storylane */

.demo{

flex:1;

background:white;

}

iframe{

width:100%;

height:100%;

border:none;

}

.footer{

position:fixed;

bottom:15px;

right:15px;

left: 15px;

background:white;

padding:15px 25px;

border-radius:18px;

box-shadow:0 10px 25px rgba(0,0,0,.12);

}

.footer button{

border:none;

padding:12px 25px;

background:#2F66F5;

color:white;

border-radius:12px;

font-weight:600;

width:100%;


}

</style>

</head>

<body>

<audio autoplay id="voiceGuide">

<source src="assets/audio/storylane.mp3">

</audio>
<div class="topbar">

    <div class="left">

        <button id="menuBtn">
            ☰
        </button>

        <img src="assets/images/logo.png" class="logo">

        <div class="title">
            SaniTrack Interactive Demo
        </div>

    </div>

    <div class="right">

        <div class="badge" id="facility">
            Facility
        </div>

        <div class="badge" id="role">
            Role
        </div>

        <div class="timer">
            <span id="time">00:00</span>
        </div>

        <button
            class="exit"
            onclick="location.href='hub.html'">
            Exit Demo
        </button>

    </div>

</div>

<div class="wrapper">

<div class="sidebar">

<h3>

Guided Walkthrough

</h3>

<div class="progress">

<div class="progress-item">

<span class="dot"></span>

Login

</div>

<div class="progress-item current">

<span class="dot"></span>

Dashboard

</div>

<div class="progress-item">

<span class="dot"></span>

MSS

</div>

<div class="progress-item">

<span class="dot"></span>

Assets

</div>

<div class="progress-item">

<span class="dot"></span>

Chemicals

</div>

<div class="progress-item">

<span class="dot"></span>

Work Orders

</div>

<div class="progress-item">

<span class="dot"></span>

Reports

</div>

</div>

<div class="guide">

<h5>

🎙 SaniGuide

</h5>

<p>

Follow the highlighted steps inside the interactive walkthrough. Complete each task to unlock the next stage.

</p>

<button
class="voice"
onclick="document.getElementById('voiceGuide').play()">

Replay Narration

</button>

</div>

</div>

<div class="demo">

<!-- REPLACE WITH YOUR STORYLANE LINK -->

<iframe

src="https://demo.storylane.com/share/i53t2ovopf79"

allowfullscreen>

</iframe>

</div>

</div>

<div class="footer">

<button
onclick="location.href='explore.html'">

I've Finished the Guided Tour →

</button>

</div>

<script>

document.getElementById("facility").innerHTML =
localStorage.getItem("facility") || "Demo Facility";

document.getElementById("role").innerHTML =
localStorage.getItem("role") || "Manager";

let seconds=0;

setInterval(()=>{

seconds++;

let m=Math.floor(seconds/60);

let s=seconds%60;

document.getElementById("time").innerHTML=

String(m).padStart(2,'0')

+":"

+

String(s).padStart(2,'0');

},1000);

const menuBtn = document.getElementById("menuBtn");

const sidebar = document.querySelector(".sidebar");

menuBtn.addEventListener("click", function () {

    sidebar.classList.toggle("open");

});

</script>

</body>

</html>
