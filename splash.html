<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Preparing SaniTrack Experience</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="assets/css/style.css">

<style>

body{

    margin:0;
    overflow:hidden;
    font-family:Poppins,sans-serif;

    background:
    linear-gradient(
    135deg,
    #241533,
    #2b1940,
    #3447b3);

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;

}

.splash-card{

    width:700px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.12);

    border-radius:30px;

    text-align:center;

    padding:60px;

    color:white;

}

.logo{

    width:90px;

    margin-bottom:25px;

    animation:float 3s infinite ease-in-out;

}

h1{

    font-size:48px;

    margin-bottom:12px;

}

.subtitle{

    color:#d8d8d8;

    margin-bottom:50px;

}

.loader{

    width:120px;
    height:120px;

    margin:auto;

    border-radius:50%;

    border:8px solid rgba(255,255,255,.1);

    border-top:8px solid #E65CB3;

    animation:spin 1.1s linear infinite;

}

.loading-text{

    margin-top:30px;

    font-size:18px;

    color:#fff;

}

.checklist{

    margin-top:50px;

    text-align:left;

    width:320px;

    margin-left:auto;
    margin-right:auto;

}

.item{

    display:flex;

    justify-content:space-between;

    padding:12px 0;

    border-bottom:1px solid rgba(255,255,255,.08);

}

.check{

    color:#41d87f;

    opacity:0;

}

.fade{

    animation:fade .6s forwards;

}

.progress{

    width:100%;

    height:10px;

    margin-top:40px;

    border-radius:20px;

    overflow:hidden;

    background:rgba(255,255,255,.08);

}

.bar{

    width:0%;

    height:100%;

    background:#2F66F5;

    transition:.6s;

}

@keyframes spin{

to{

transform:rotate(360deg);

}

}

@keyframes float{

50%{

transform:translateY(-8px);

}

}

@keyframes fade{

to{

opacity:1;

}

}

</style>

</head>

<body>

<audio autoplay id="voice">

<source src="assets/audio/splash.mp3">

</audio>

<div class="splash-card">

<img
src="assets/images/logo.png"
class="logo">

<h1>

Welcome to SaniTrack

</h1>

<div class="subtitle">

Preparing your interactive demonstration...

</div>

<div class="loader"></div>

<div class="loading-text"

id="loadingText">

Initializing Demo Environment...

</div>

<div class="progress">

<div
class="bar"
id="bar">

</div>

</div>

<div class="checklist">

<div class="item">

Loading Facility

<span class="check">✔</span>

</div>

<div class="item">

Loading Assets

<span class="check">✔</span>

</div>

<div class="item">

Loading Staff

<span class="check">✔</span>

</div>

<div class="item">

Loading Chemicals

<span class="check">✔</span>

</div>

<div class="item">

Starting Simulation

<span class="check">✔</span>

</div>

</div>

</div>

<script>

const messages=[

"Preparing Facility...",

"Loading Asset Register...",

"Loading Work Orders...",

"Loading Chemicals...",

"Starting Simulation...",

"Launching Experience..."

];

const checks=document.querySelectorAll(".check");

const bar=document.getElementById("bar");

const text=document.getElementById("loadingText");

let i=0;

function next(){

if(i<checks.length){

checks[i].classList.add("fade");

bar.style.width=((i+1)*20)+"%";

text.innerHTML=messages[i];

i++;

setTimeout(next,1400);

}else{

text.innerHTML="Welcome to SaniTrack";

setTimeout(()=>{

window.location.href="hub.html";

},1800);

}

}

setTimeout(next,1200);

</script>

</body>

</html>
